<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Azra Bano — passionate about researching and building in AI and ML to help people and make our world a better place">
  <defs>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2b2b"/>
      <stop offset="100%" stop-color="#7a0010"/>
    </linearGradient>
  </defs>

  <!-- solid black panel -->
  <rect width="900" height="200" fill="#0a0a0a"/>
  <!-- thin red frame accents -->
  <rect x="0" y="0" width="900" height="4" fill="#ff2b2b"/>
  <rect x="0" y="196" width="900" height="4" fill="#7a0010"/>

  <!-- name -->
  <text x="60" y="86" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="bold"
        letter-spacing="6" fill="#ff2b2b">AZRA BANO</text>

  <!-- red underline (visible by default, animates in where supported) -->
  <rect x="62" y="102" width="370" height="3" fill="url(#redline)">
    <animate attributeName="width" from="0" to="370" dur="1.1s" begin="0.2s" fill="freeze"
             keySplines="0.2 0.8 0.2 1" calcMode="spline" keyTimes="0;1" values="0;370"/>
  </rect>

  <!-- bio, two lines -->
  <text x="64" y="138" font-family="'Courier New', monospace" font-size="16" letter-spacing="1.5"
        fill="#e5e5e5">Passionate about researching &amp; building in AI &amp; ML</text>
  <text x="64" y="164" font-family="'Courier New', monospace" font-size="16" letter-spacing="1.5"
        fill="#e5e5e5">to help people and make our world a better place.</text>
</svg>
